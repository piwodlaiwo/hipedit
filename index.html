<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>AI Prompt Templates | HipEdit</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-7NWBQ89020"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-7NWBQ89020');
</script>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: 'DM Sans', sans-serif; }
  #app { height: 100vh; height: 100dvh; }
  .sidebar { overflow-y: auto; }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: #d1c9b8; border-radius: 2px; }
  .vars-scroll { overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .vars-scroll::-webkit-scrollbar { width: 4px; }
  .vars-scroll::-webkit-scrollbar-track { background: transparent; }
  .vars-scroll::-webkit-scrollbar-thumb { background: #d1c9b8; border-radius: 2px; }
  .chip-btn { transition: all 0.12s; }
  .chip-btn:hover { background: #e8e2d9; }
  .chip-btn.selected { background: #2d2926; color: #f5f0e8; border-color: #2d2926; }
  .var-input:focus { outline: none; border-color: #9c8e7e; }
  .prompt-area { resize: none; font-family: monospace; -webkit-overflow-scrolling: touch; }
  .prompt-area:focus { outline: none; }
  .drag-handle { cursor: ns-resize; user-select: none; }
  textarea:focus { outline: none; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(45,41,38,0.5); display: flex; align-items: center; justify-content: center; z-index: 50; }
  .modal-box { animation: slideUp 0.18s ease; }
  @keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  /* Mobile drawer */
  #mobile-drawer { transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
  #drawer-backdrop { transition: opacity 0.25s ease; }

  /* Prompt section height: smaller on mobile */
  #prompt-section { height: 130px; }
  @media (min-width: 768px) { #prompt-section { height: 172px; } }

  /* iOS safe area */
  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    #action-bar { padding-bottom: max(12px, env(safe-area-inset-bottom)); }
    #mobile-drawer-footer { padding-bottom: max(16px, env(safe-area-inset-bottom)); }
  }

  /* Better tap targets on mobile */
  @media (max-width: 767px) {
    .sidebar-item { min-height: 40px; }
  }
</style>
</head>
<body>

<div id="app" class="flex flex-col bg-stone-50" style="font-family:'DM Sans',sans-serif; overflow:hidden;">

  <!-- Mobile drawer backdrop -->
  <div id="drawer-backdrop" class="fixed inset-0 z-30 md:hidden" style="background:rgba(45,41,38,0.45); opacity:0; pointer-events:none;"></div>

  <!-- Mobile template drawer -->
  <div id="mobile-drawer" class="fixed inset-y-0 left-0 z-40 flex flex-col bg-white md:hidden" style="width:min(300px,88vw); transform:translateX(-100%); box-shadow: 4px 0 24px rgba(0,0,0,0.10);">
    <div class="flex items-center justify-between px-5 h-12 border-b border-stone-200 flex-shrink-0">
      <span class="font-semibold text-stone-800 text-sm tracking-tight">Hip<span class="text-amber-700">Edit</span> <span class="text-stone-400 font-normal">· Templates</span></span>
      <button id="btn-close-drawer" style="display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;border:none;background:transparent;cursor:pointer;color:#a8a29e;">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M1 1L13 13M13 1L1 13" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div id="mobile-sidebar-content" class="flex-1 overflow-y-auto py-4" style="-webkit-overflow-scrolling:touch;"></div>
    <div id="mobile-drawer-footer" class="border-t border-stone-100 p-4 flex-shrink-0">
      <button id="btn-open-modal-mobile" class="w-full text-sm font-medium bg-amber-700 hover:bg-amber-800 text-white px-3 py-3 rounded-xl transition-colors">Request a Template</button>
    </div>
  </div>

  <!-- Nav -->
  <nav class="flex items-center px-4 md:px-5 h-12 border-b border-stone-200 bg-white flex-shrink-0 gap-3 relative z-20">
    <!-- Mobile: hamburger + logo -->
    <button id="btn-open-drawer" class="md:hidden flex items-center gap-2.5 rounded-lg" style="border:none;background:transparent;cursor:pointer;padding:8px 4px 8px 0;margin-left:-2px;">
      <svg width="17" height="13" viewBox="0 0 17 13" fill="none" stroke="#57534e" stroke-width="1.8" stroke-linecap="round">
        <line x1="0" y1="1" x2="17" y2="1"/><line x1="0" y1="6.5" x2="17" y2="6.5"/><line x1="0" y1="12" x2="11" y2="12"/>
      </svg>
      <span class="font-semibold text-stone-800 text-sm tracking-tight">Hip<span class="text-amber-700">Edit</span></span>
    </button>
    <!-- Desktop: logo + subtitle -->
    <span class="hidden md:inline font-semibold text-stone-800 text-sm tracking-tight">Hip<span class="text-amber-700">Edit</span></span>
    <span class="hidden md:block w-px h-4 bg-stone-200"></span>
    <span class="hidden md:block text-stone-400 text-xs font-medium tracking-wide uppercase">AI Prompt Template Editor</span>
    <!-- Desktop: Request Template -->
    <button id="btn-open-modal" class="hidden md:block ml-auto text-xs font-medium bg-amber-700 hover:bg-amber-800 text-white px-3 py-1.5 rounded-md transition-colors">Request a Template</button>
    <!-- Share -->
    <div class="relative ml-auto md:ml-0" id="share-container">
      <button id="btn-share" class="flex items-center gap-1.5 text-xs font-medium text-stone-500 hover:text-stone-800 border border-stone-200 hover:border-stone-300 bg-white px-3 py-1.5 rounded-md transition-colors">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        Share
      </button>
      <div id="share-dropdown" style="display:none; position:absolute; right:0; top:calc(100% + 6px); background:white; border:0.5px solid #e7e5e4; border-radius:10px; box-shadow:0 4px 16px rgba(0,0,0,0.08); min-width:180px; z-index:100; overflow:hidden;">
        <div style="padding:6px;">
          <a id="share-x" href="#" class="share-option" style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;text-decoration:none;color:#44403c;font-size:12px;transition:background 0.1s;" onmouseover="this.style.background='#f5f5f4'" onmouseout="this.style.background='transparent'">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.91-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            Share on X
          </a>
          <a id="share-linkedin" href="#" class="share-option" style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;text-decoration:none;color:#44403c;font-size:12px;transition:background 0.1s;" onmouseover="this.style.background='#f5f5f4'" onmouseout="this.style.background='transparent'">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6zM2 9h4v12H2z"/><circle cx="4" cy="4" r="2"/></svg>
            Share on LinkedIn
          </a>
          <a id="share-facebook" href="#" class="share-option" style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;text-decoration:none;color:#44403c;font-size:12px;transition:background 0.1s;" onmouseover="this.style.background='#f5f5f4'" onmouseout="this.style.background='transparent'">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
            Share on Facebook
          </a>
          <a id="share-reddit" href="#" class="share-option" style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;text-decoration:none;color:#44403c;font-size:12px;transition:background 0.1s;" onmouseover="this.style.background='#f5f5f4'" onmouseout="this.style.background='transparent'">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/><path fill="white" d="M20 12a2 2 0 0 0-2-2 2 2 0 0 0-1.4.6A9.9 9.9 0 0 0 12.5 9l.9-3.9 2.8.6a1.5 1.5 0 1 0 .2-.9l-3.1-.7L12 8a9.9 9.9 0 0 0-4.1 1.6A2 2 0 1 0 5.6 13a3.6 3.6 0 0 0 0 .5c0 2.5 2.9 4.5 6.4 4.5s6.4-2 6.4-4.5a3.6 3.6 0 0 0 0-.5A2 2 0 0 0 20 12zm-10 1.5a1 1 0 1 1 2 0 1 1 0 0 1-2 0zm5.6 2.6a3.5 3.5 0 0 1-3.6 0 .3.3 0 0 1 .3-.5 2.9 2.9 0 0 0 3 0 .3.3 0 0 1 .3.5zm-.1-1.6a1 1 0 1 1 2 0 1 1 0 0 1-2 0z"/></svg>
            Share on Reddit
          </a>
          <div style="height:0.5px;background:#e7e5e4;margin:4px 0;"></div>
          <a id="share-copy" href="#" class="share-option" style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;text-decoration:none;color:#44403c;font-size:12px;transition:background 0.1s;" onmouseover="this.style.background='#f5f5f4'" onmouseout="this.style.background='transparent'">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy link
          </a>
        </div>
      </div>
    </div>
  </nav>

  <div class="flex flex-1 min-h-0">

    <!-- Desktop sidebar -->
    <aside class="sidebar hidden md:block w-48 flex-shrink-0 border-r border-stone-200 bg-white py-4">
      <div id="sidebar-content"></div>
    </aside>

    <div class="flex flex-col flex-1 min-w-0 min-h-0">

      <!-- Hero: desktop only -->
      <div class="hidden md:block px-6 pt-5 pb-4 border-b border-stone-200 bg-white flex-shrink-0">
        <p style="font-family:'Instrument Serif',serif;" class="text-2xl text-stone-800 leading-snug">Discover, use, and share great prompts<br><span class="italic text-stone-400">so that you can get meaningful outcomes from your AI tools.</span></p>
      </div>

      <!-- Template header — tappable on mobile to open drawer -->
      <div id="tpl-header" class="px-4 md:px-6 py-3 border-b border-stone-100 bg-stone-50 flex-shrink-0">
        <div class="flex items-center gap-2 mb-0.5">
          <span id="tpl-title" class="text-sm font-semibold text-stone-800 truncate"></span>
          <span id="tpl-cat" class="text-xs text-amber-700 bg-amber-50 border border-amber-200 px-2 py-0.5 rounded flex-shrink-0"></span>
          <!-- Chevron hint on mobile -->
          <svg id="tpl-chevron" class="md:hidden ml-auto flex-shrink-0 text-stone-300" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
        <p id="tpl-desc" class="text-xs text-stone-400 leading-snug" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;"></p>
      </div>

      <!-- Prompt section -->
      <div id="prompt-section" class="flex-shrink-0 bg-white border-b border-stone-200 flex flex-col" style="min-height:80px; max-height:60vh;">
        <div class="px-4 md:px-6 pt-3 md:pt-4 pb-2 flex-shrink-0">
          <label class="text-xs font-semibold tracking-widest uppercase text-stone-400 block mb-2">Prompt</label>
        </div>
        <textarea id="prompt-editor" class="prompt-area flex-1 mx-4 md:mx-6 bg-stone-50 border border-stone-200 rounded-lg p-3 text-xs leading-relaxed text-stone-700 mb-2" spellcheck="false"></textarea>
        <!-- Drag handle -->
        <div class="drag-handle flex flex-shrink-0 items-center justify-center h-5 border-t border-stone-100 bg-stone-50 group" id="drag-handle">
          <div class="flex gap-1">
            <div class="w-4 h-0.5 rounded-full bg-stone-300 group-hover:bg-stone-400 transition-colors"></div>
            <div class="w-4 h-0.5 rounded-full bg-stone-300 group-hover:bg-stone-400 transition-colors"></div>
            <div class="w-4 h-0.5 rounded-full bg-stone-300 group-hover:bg-stone-400 transition-colors"></div>
          </div>
        </div>
      </div>

      <!-- Variables -->
      <div class="vars-scroll flex-1 px-4 md:px-6 py-4 bg-stone-50 min-h-0">
        <p class="text-xs font-semibold tracking-widest uppercase text-stone-400 mb-3">Variables</p>
        <div id="vars-grid" class="grid grid-cols-2 gap-3"></div>
      </div>

      <!-- Action bar -->
      <div id="action-bar" class="flex gap-3 px-4 md:px-6 py-3 border-t border-stone-200 bg-white flex-shrink-0">
        <button id="btn-copy" class="flex-1 flex items-center justify-center gap-2 bg-amber-700 hover:bg-amber-800 text-white text-sm font-medium rounded-lg py-3 md:py-2.5 transition-colors">
          &#x2398; Copy Prompt to Clipboard
        </button>
        <button class="hidden md:flex flex-1 items-center justify-center gap-2 bg-stone-100 text-stone-400 text-sm font-medium rounded-lg py-2.5 cursor-default border border-stone-200">
          &#9654; Run with Variables <span class="text-xs text-stone-300 ml-1">coming soon</span>
        </button>
      </div>

    </div>
  </div>
</div>

<!-- Modal -->
<div id="modal" style="display:none;" class="modal-overlay">
  <div class="modal-box bg-white rounded-xl border border-stone-200 w-80 mx-4 overflow-hidden">
    <div class="px-5 py-4 border-b border-stone-100 flex items-center justify-between">
      <div>
        <p class="text-sm font-semibold text-stone-800">Request a Template</p>
        <p class="text-xs text-stone-400 mt-0.5">Tell us what you need — we'll build it.</p>
      </div>
      <button id="btn-close-modal" aria-label="Close" style="display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:6px;border:none;background:transparent;cursor:pointer;color:#a8a29e;" onmouseover="this.style.background='#f5f5f4';this.style.color='#57534e'" onmouseout="this.style.background='transparent';this.style.color='#a8a29e'">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1L13 13M13 1L1 13" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="px-5 py-4 flex flex-col gap-4">
      <div>
        <label class="text-xs font-semibold tracking-widest uppercase text-stone-400 block mb-1.5">Template Name</label>
        <input id="req-name" type="text" placeholder="e.g. LinkedIn Post Generator" class="var-input w-full border border-stone-200 rounded-lg px-3 py-2 text-sm text-stone-700 bg-stone-50" style="font-family:'DM Sans',sans-serif;" />
      </div>
      <div>
        <label class="text-xs font-semibold tracking-widest uppercase text-stone-400 block mb-1.5">Category</label>
        <input id="req-category" type="text" placeholder="e.g. Content Writing, Marketing, Code & Dev" class="var-input w-full border border-stone-200 rounded-lg px-3 py-2 text-sm text-stone-700 bg-stone-50" style="font-family:'DM Sans',sans-serif;" />
      </div>
      <div>
        <label class="text-xs font-semibold tracking-widest uppercase text-stone-400 block mb-1.5">What should it do?</label>
        <textarea id="req-description" placeholder="Describe what you want this template to help with..." class="var-input w-full border border-stone-200 rounded-lg px-3 py-2 text-sm text-stone-700 bg-stone-50 min-h-20" style="resize:none;font-family:'DM Sans',sans-serif;"></textarea>
      </div>
      <button id="btn-submit-request" class="w-full bg-amber-700 hover:bg-amber-800 text-white text-sm font-medium rounded-lg py-2.5 transition-colors">Submit Request</button>
      <p id="form-feedback" style="display:none;" class="text-xs text-center text-stone-500"></p>
    </div>
  </div>
</div>

<script>
const TEMPLATES = {

  // ── Content Writing ──────────────────────────────────────────────
  "Blog Post Generator": {
    cat: "Content Writing",
    desc: "Generate a structured, well-formatted blog post on any topic — tailored to your audience, tone, and length.",
    prompt: `You are an expert content writer specializing in [TOPIC] for [AUDIENCE].

Write a [TONE] blog post titled "[TITLE]" that is approximately [LENGTH] words.

The post should open with a compelling hook about [HOOK_ANGLE], include [NUM_SECTIONS] main sections with H2 headers, and end with a clear call-to-action: [CTA].

Format in Markdown. Use real examples and avoid generic advice.`,
    vars: {
      TITLE:        { full: true,  chips: [], def: "Why AI is the PM's new superpower" },
      TONE:         { full: false, chips: ["Professional","Casual","Witty","Authoritative"], def: "Professional" },
      AUDIENCE:     { full: false, chips: ["Beginners","Developers","Executives","General public"], def: "Developers" },
      TOPIC:        { full: false, chips: ["AI & Tech","Marketing","Productivity"], def: "AI & Tech" },
      LENGTH:       { full: false, chips: ["300","800","1500"], labels: {"300":"Short (300w)","800":"Medium (800w)","1500":"Long (1500w)"}, def: "800" },
      NUM_SECTIONS: { full: false, chips: ["3","5","7"], def: "5" },
      HOOK_ANGLE:   { full: false, chips: ["a surprising statistic","a common misconception","a bold prediction"], labels: {"a surprising statistic":"Surprising stat","a common misconception":"Misconception","a bold prediction":"Bold prediction"}, def: "a surprising statistic" },
      CTA:          { full: false, chips: ["Sign up for our newsletter","Book a free demo","Share this post"], labels: {"Sign up for our newsletter":"Newsletter signup","Book a free demo":"Book a demo","Share this post":"Share post"}, def: "Try it free today" }
    }
  },

  "Product Description": {
    cat: "Content Writing",
    desc: "Write compelling, conversion-focused product descriptions tailored to your platform, customer, and brand voice.",
    prompt: `You are an expert ecommerce copywriter who specializes in writing product descriptions that convert browsers into buyers.

Write a [TONE] product description for "[PRODUCT_NAME]", a [PRODUCT_CATEGORY] product.

Target customer: [AUDIENCE]
Key benefits to highlight: [KEY_BENEFITS]
Word count: approximately [LENGTH] words

Structure the description with a punchy opening line, 2–3 sentences expanding on the core value, and a short bulleted feature list (3–5 bullets). End with a single confident closing sentence.

Platform: [PLATFORM]. Avoid jargon. Do not use exclamation marks more than once.`,
    vars: {
      PRODUCT_NAME:     { full: true,  chips: [], def: "Ember Travel Mug" },
      PRODUCT_CATEGORY: { full: false, chips: ["Kitchenware","Electronics","Apparel","Beauty","Fitness","Home Decor"], def: "Kitchenware" },
      TONE:             { full: false, chips: ["Warm & friendly","Premium & refined","Bold & energetic","Minimalist"], def: "Warm & friendly" },
      AUDIENCE:         { full: false, chips: ["Busy professionals","Home cooks","Outdoor enthusiasts","Gift shoppers"], def: "Busy professionals" },
      KEY_BENEFITS:     { full: true,  chips: ["Temperature control, sleek design, leak-proof","Lightweight, durable, eco-friendly","Fast results, easy to use, compact"], def: "Temperature control, sleek design, leak-proof" },
      LENGTH:           { full: false, chips: ["50","100","150"], labels: {"50":"Short (50w)","100":"Standard (100w)","150":"Long (150w)"}, def: "100" },
      PLATFORM:         { full: false, chips: ["Amazon","Shopify store","Instagram","Brand website"], def: "Shopify store" }
    }
  },

  "Social Media Caption": {
    cat: "Content Writing",
    desc: "Craft engaging, on-brand captions for any social platform — with the right tone, hooks, and hashtag strategy.",
    prompt: `You are a social media strategist and copywriter with deep expertise in [PLATFORM] content.

Write a [TONE] caption for a post about [TOPIC].

Brand voice: [BRAND_VOICE]
Caption length: [LENGTH]
Include [HASHTAG_COUNT] relevant hashtags at the end.
Call-to-action: [CTA]

The caption should hook the reader in the first line (no "Are you..." openers). Write for scroll-stopping engagement. Emojis: [EMOJI_STYLE].`,
    vars: {
      TOPIC:         { full: true,  chips: [], def: "Launching our new summer collection" },
      PLATFORM:      { full: false, chips: ["Instagram","LinkedIn","TikTok","Twitter/X","Facebook"], def: "Instagram" },
      TONE:          { full: false, chips: ["Playful","Inspirational","Professional","Witty"], def: "Playful" },
      BRAND_VOICE:   { full: false, chips: ["Friendly & approachable","Luxury & aspirational","Bold & disruptive","Calm & trustworthy"], def: "Friendly & approachable" },
      LENGTH:        { full: false, chips: ["short","medium","long"], labels: {"short":"Short (1–2 lines)","medium":"Medium (3–4 lines)","long":"Long (5+ lines)"}, def: "medium" },
      HASHTAG_COUNT: { full: false, chips: ["3","5","10","15"], def: "5" },
      CTA:           { full: false, chips: ["Link in bio","Drop a comment","Tag a friend","Shop now"], def: "Link in bio" },
      EMOJI_STYLE:   { full: false, chips: ["None","Minimal (1–2)","Moderate (3–5)","Heavy"], def: "Minimal (1–2)" }
    }
  },

  // ── Customer Support ─────────────────────────────────────────────
  "Reply to Complaint": {
    cat: "Customer Support",
    desc: "Write a calm, professional response to a customer complaint that acknowledges the issue and moves toward resolution.",
    prompt: `You are a senior customer support specialist known for turning frustrated customers into loyal ones.

A customer has submitted the following type of complaint: [COMPLAINT_TYPE]
Their frustration level appears to be: [FRUSTRATION_LEVEL]
Our company's name: [COMPANY_NAME]

Write a [TONE] reply that:
1. Opens by genuinely acknowledging the customer's experience (do not use "I'm sorry for any inconvenience")
2. Takes appropriate ownership without admitting legal liability
3. Clearly explains the next step or resolution: [RESOLUTION]
4. Closes warmly and invites further contact

Keep it under [LENGTH] words. Do not use corporate jargon or hollow phrases.`,
    vars: {
      COMPLAINT_TYPE:    { full: true,  chips: ["Delayed shipment","Wrong item received","Billing error","Poor service experience","Product defect"], def: "Delayed shipment" },
      RESOLUTION:        { full: true,  chips: ["Full refund issued","Replacement being shipped","Account credit applied","Escalated to specialist"], def: "Replacement being shipped" },

let activeTemplate = "Blog Post Generator";
let values = {};

function loadTemplate(name) {
  const tpl = TEMPLATES[name];
  if (!tpl) return;
  activeTemplate = name;
  values = {};
  Object.keys(tpl.vars).forEach(k => values[k] = tpl.vars[k].def);
  document.getElementById('tpl-title').textContent = name;
  document.getElementById('tpl-cat').textContent = tpl.cat;
  document.getElementById('tpl-desc').textContent = tpl.desc;
  document.getElementById('prompt-editor').value = tpl.prompt;
  renderVars();
  updateSidebarActive(name);
}

function updateSidebarActive(name) {
  document.querySelectorAll('.sidebar-item').forEach(el => {
    const isActive = el.dataset.name === name;
    el.className = 'sidebar-item flex items-center gap-2 px-4 py-1.5 text-xs cursor-pointer border-l-2 ' +
      (isActive ? 'border-amber-700 bg-amber-50 text-stone-800 font-medium' : 'border-transparent text-stone-500 hover:text-stone-700 hover:bg-stone-50');
    el.querySelector('span').className = `w-1 h-1 rounded-full flex-shrink-0 ${isActive ? 'bg-amber-700' : 'bg-stone-300'}`;
  });
}

function renderVars() {
  const tpl = TEMPLATES[activeTemplate];
  const promptText = document.getElementById('prompt-editor').value;
  const grid = document.getElementById('vars-grid');
  grid.innerHTML = '';
  if (!tpl) return;
  const activeKeys = Object.keys(tpl.vars)
    .filter(k => promptText.includes(`[${k}]`))
    .sort((a, b) => {
      const aFull = tpl.vars[a].full, bFull = tpl.vars[b].full;
      if (aFull && !bFull) return -1;
      if (!aFull && bFull) return 1;
      return promptText.indexOf(`[${a}]`) - promptText.indexOf(`[${b}]`);
    });
  activeKeys.forEach(key => {
    const cfg = tpl.vars[key];
    const field = document.createElement('div');
    field.className = 'bg-white border border-stone-200 rounded-lg p-3 ' + (cfg.full ? 'col-span-2' : '');
    const lbl = document.createElement('div');
    lbl.className = 'text-xs font-mono text-amber-700 mb-2';
    lbl.textContent = `[${key}]`;
    field.appendChild(lbl);
    if (cfg.chips && cfg.chips.length > 0) {
      const chipsDiv = document.createElement('div');
      chipsDiv.className = 'flex flex-wrap gap-1.5 mb-2';
      cfg.chips.forEach(val => {
        const chip = document.createElement('button');
        chip.className = 'chip-btn text-xs px-2 py-1 rounded border border-stone-200 text-stone-500 bg-stone-50 ' + (values[key] === val ? 'selected' : '');
        chip.textContent = (cfg.labels && cfg.labels[val]) ? cfg.labels[val] : val;
        chip.addEventListener('click', () => {
          values[key] = val;
          field.querySelector('.var-inp').value = val;
          chipsDiv.querySelectorAll('.chip-btn').forEach(c => c.classList.remove('selected'));
          chip.classList.add('selected');
        });
        chipsDiv.appendChild(chip);
      });
      field.appendChild(chipsDiv);
    }
    const input = document.createElement('input');
    input.className = 'var-inp var-input w-full border border-stone-200 rounded px-2 py-1 text-xs text-stone-700 bg-stone-50';
    input.style.fontFamily = "'DM Sans', sans-serif";
    input.value = values[key] !== undefined ? values[key] : cfg.def;
    input.addEventListener('input', () => {
      values[key] = input.value;
      if (cfg.chips && cfg.chips.length > 0) {
        field.querySelectorAll('.chip-btn').forEach(c => {
          c.classList.toggle('selected', cfg.chips.some(v => v === values[key] && c.textContent === ((cfg.labels && cfg.labels[v]) ? cfg.labels[v] : v)));
        });
      }
    });
    field.appendChild(input);
    grid.appendChild(field);
  });
}

// ── Build sidebars ────────────────────────────────────────────────────
function buildSidebar(containerEl, isMobile) {
  SIDEBAR_DATA.forEach(sec => {
    const section = document.createElement('div');
    section.className = 'mb-4';
    const cat = document.createElement('div');
    cat.className = 'text-xs font-semibold tracking-widest uppercase text-stone-400 px-4 mb-1';
    cat.textContent = sec.cat;
    section.appendChild(cat);
    sec.items.forEach(item => {
      const el = document.createElement('div');
      el.className = 'sidebar-item flex items-center gap-2 px-4 py-1.5 text-xs cursor-pointer border-l-2 border-transparent text-stone-500 hover:text-stone-700 hover:bg-stone-50';
      el.dataset.name = item;
      el.innerHTML = `<span class="w-1 h-1 rounded-full flex-shrink-0 bg-stone-300"></span>${item}`;
      if (TEMPLATES[item]) {
        el.addEventListener('click', () => {
          loadTemplate(item);
          if (isMobile) closeDrawer();
        });
      }
      section.appendChild(el);
    });
    containerEl.appendChild(section);
  });
}

const modal = document.getElementById('modal');
document.getElementById('btn-open-modal').addEventListener('click', () => { modal.style.display = 'flex'; });
document.getElementById('btn-open-modal-mobile').addEventListener('click', () => { closeDrawer(); modal.style.display = 'flex'; });
document.getElementById('btn-close-modal').addEventListener('click', () => { modal.style.display = 'none'; });

// ── Drag resize (desktop only) ─────────────────────────────────────────
const promptSection = document.getElementById('prompt-section');
const dragHandle = document.getElementById('drag-handle');
let dragging = false, startY = 0, startH = 0;
dragHandle.addEventListener('mousedown', e => {
  dragging = true; startY = e.clientY; startH = promptSection.offsetHeight;
  document.body.style.cursor = 'ns-resize';
  document.body.style.userSelect = 'none';
});
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const newH = Math.min(window.innerHeight * 0.6, Math.max(80, startH + (e.clientY - startY)));
  promptSection.style.height = newH + 'px';
});
document.addEventListener('mouseup', () => {
  dragging = false;
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
});

document.getElementById('prompt-editor').addEventListener('input', renderVars);

// ── Copy button ────────────────────────────────────────────────────────
document.getElementById('btn-copy').addEventListener('click', () => {
  let text = document.getElementById('prompt-editor').value;
  const btn = document.getElementById('btn-copy');
  Object.keys(values).forEach(k => { text = text.replaceAll(`[${k}]`, values[k]); });
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).catch(() => {});
    btn.innerHTML = '&#10003; Copied!';
  } else {
    document.getElementById('prompt-editor').value = text;
    btn.innerHTML = '&#10003; Updated Text Above!';
  }
  btn.style.background = '#4a9e6b';
  setTimeout(() => {
    btn.innerHTML = '&#x2398; Copy Prompt to Clipboard';
    btn.style.background = '';
  }, 2000);
});

// ── Share button ───────────────────────────────────────────────────────
const shareBtn = document.getElementById('btn-share');
const shareDropdown = document.getElementById('share-dropdown');

shareBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  shareDropdown.style.display = shareDropdown.style.display === 'block' ? 'none' : 'block';
});
document.addEventListener('click', (e) => {
  if (!document.getElementById('share-container').contains(e.target)) {
    shareDropdown.style.display = 'none';
  }
});

// ── Request a Template form ────────────────────────────────────────────
document.getElementById('btn-submit-request').addEventListener('click', async () => {
  const name     = document.getElementById('req-name').value.trim();
  const category = document.getElementById('req-category').value.trim();
  const desc     = document.getElementById('req-description').value.trim();
  const feedback = document.getElementById('form-feedback');
  const btn      = document.getElementById('btn-submit-request');

  if (!name || !desc) {
    feedback.textContent = 'Please fill in at least the template name and description.';
    feedback.style.color = '#b45309';
    feedback.style.display = 'block';
    return;
  }

  btn.textContent = 'Sending...';
  btn.disabled = true;

  try {
    const res = await fetch('https://formspree.io/f/xbdwnabk', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ 'Template Name': name, 'Category': category, 'Description': desc })
    });

    if (res.ok) {
      btn.style.display = 'none';
      feedback.textContent = '✓ Request submitted! We\'ll review it and build it soon.';
      feedback.style.color = '#4a9e6b';
      feedback.style.display = 'block';
      document.getElementById('req-name').value = '';
      document.getElementById('req-category').value = '';
      document.getElementById('req-description').value = '';
      setTimeout(() => {
        modal.style.display = 'none';
        btn.style.display = 'block';
        btn.textContent = 'Submit Request';
        btn.disabled = false;
        feedback.style.display = 'none';
      }, 2500);
    } else {
      throw new Error('Server error');
    }
  } catch {
    feedback.textContent = 'Something went wrong. Please try again.';
    feedback.style.color = '#b45309';
    feedback.style.display = 'block';
    btn.textContent = 'Submit Request';
    btn.disabled = false;
  }
});
